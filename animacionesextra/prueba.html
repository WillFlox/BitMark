<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrusel Full Width</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
}

/* CONTENEDOR FULL WIDTH */
.carousel-container {
    position: relative;
    width: 100vw;      /* 🔥 ocupa toda la pantalla */
    height: 320px;
    overflow: hidden;
}

/* SLIDE */
.carousel-slide {
    display: flex;
    width: 100%;
    height: 100%;
    transition: transform 0.6s ease;
}

/* CADA IMAGEN */
.ui-search-header--deal {
    min-width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
}

/* FLECHAS */
.carousel-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.85);
    border: none;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    font-size: 20px;
}

.carousel-arrow:hover {
    background: white;
}

.left { left: 20px; }
.right { right: 20px; }

/* DOTS */
.carousel-dots {
    position: absolute;
    bottom: 15px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 8px;
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
}

.dot.active {
    background: white;
    transform: scale(1.2);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .carousel-container {
        height: 200px;
    }
}
</style>
</head>

<body>

<div class="carousel-container">

    <div class="carousel-slide" id="slide">

        <section class="ui-search-header--deal"
            style="background-image:url('https://http2.mlstatic.com/storage/items-exhibition-api/banners-cont-deco-p/1778193974513-escritorioaging.png')">
        </section>

        <section class="ui-search-header--deal"
            style="background-image:url('https://http2.mlstatic.com/D_NQ_615234-MLA78602693994_082024-OO.webp')">
        </section>

        <section class="ui-search-header--deal"
            style="background-image:url('https://http2.mlstatic.com/D_NQ_782015-MLA78602693995_082024-OO.webp')">
        </section>

    </div>

    <button class="carousel-arrow left" onclick="move(-1)">&#10094;</button>
    <button class="carousel-arrow right" onclick="move(1)">&#10095;</button>

    <div class="carousel-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    </div>

</div>

<script>
const slide = document.getElementById("slide");
const dots = document.querySelectorAll(".dot");

let index = 0;
const total = dots.length;

let interval = setInterval(next, 4000);

function render() {
    slide.style.transform = `translateX(-${index * 100}%)`;

    dots.forEach(d => d.classList.remove("active"));
    dots[index].classList.add("active");
}

function next() {
    index = (index + 1) % total;
    render();
}

function move(dir) {
    index = (index + dir + total) % total;
    render();
    reset();
}

function reset() {
    clearInterval(interval);
    interval = setInterval(next, 4000);
}

// init
render();
</script>

</body>
</html>
